[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=172.20.0.0/24
external_media_address=192.168.0.55
external_signaling_address=192.168.0.55
external_signaling_port=5160

;================== Hub (静的トランク) ==================
[hub]
type=aor
contact=sip:172.20.0.10:5060
qualify_frequency=30

[hub]
type=endpoint
context=from-hub
disallow=all
allow=ulaw,alaw
aors=hub
from_user=site-b
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[hub]
type=identify
endpoint=hub
match=172.20.0.10

;================== 内線テンプレート ==================
[endpoint-tmpl](!)
type=endpoint
context=from-local
disallow=all
allow=ulaw,alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-tmpl](!)
type=auth
auth_type=userpass

[aor-tmpl](!)
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

;================== 内線 9001 ==================
[9001](endpoint-tmpl)
auth=9001
aors=9001

[9001](auth-tmpl)
username=9001
password=pass9001

[9001](aor-tmpl)

;================== 内線 9002 ==================
[9002](endpoint-tmpl)
auth=9002
aors=9002

[9002](auth-tmpl)
username=9002
password=pass9002

[9002](aor-tmpl)