[globals]

[general]
static=yes
writeprotect=no

[from-sites]
exten => 60,1,NoOp(ConfBridge entered from ${CHANNEL(endpoint)})
 same => n,Answer()
 same => n,ConfBridge(main)
 same => n,Hangup()

; Site-A 宛 (100X) を Site-A トランクに転送
exten => _100X,1,NoOp(to Site-A: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@site-a,30)
 same => n,Hangup()

; Site-Z 宛 (900X) を Site-Z トランクに転送
exten => _900X,1,NoOp(to Site-Z: ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@site-z,30)
 same => n,Hangup()

exten => _.,1,Hangup()