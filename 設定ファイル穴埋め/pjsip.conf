;番号は配布したラズパイの番号に応じて適宜変更してください
;R01 の場合は 1001, 1002, 1003...
;R02 の場合は 2001, 2002, 2003... のような感じです

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

;================== 内線 1001 ==================
[1001]
type=endpoint
;TODO: 適切なコンテキストを指定してください(例: from-local,internalなど)
context=
disallow=all
allow=ulaw,alaw
auth=1001
aors=1001

[1001]
type=auth
auth_type=userpass
username=1001
;TODO: 任意のパスワードに変更してください(例: pass1001)
password=

[1001]
type=aor
max_contacts=1

